name: Phoenix API Automation Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "0 0 * * 3"
  #Create env name dropdown
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        type: choice
        options: [qa,uat,dev]
        default: qa
        required: true
      suiteFile:
        description: "TestNG suite"
        type: choice
        options: [testSuite.xml,smoke.xml,regression.xml]
        default: testSuite.xml
        required: true
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Creating the .env file
      run: |
            echo "DB_URI=${{ secrets.DB_URI }}" >> .env
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
    - name: Execute Test
      run: mvn clean test -DsuiteFile="${{ github.event.inputs.suiteFile || 'testSuite.xml' }}" -Denv="${{ github.event.inputs.env || 'qa' }}"
    - name: Upload a Build Artifact
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Surefile Report
        path: target/surefire-reports/
        retention-days: 10
